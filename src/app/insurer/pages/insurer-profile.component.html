<h1 class="page-title">Profile</h1>
<p class="page-sub">Manage your contact details (demo form).</p>

<div class="card" style="padding: 1.25rem">
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="grid cols-2">
      <div class="field">
        <label>Full name</label>
        <input formControlName="name" />
      </div>
      <div class="field">
        <label>Email</label>
        <input formControlName="email" />
      </div>
      <div class="field">
        <label>Mobile</label>
        <input formControlName="mobile" />
      </div>
      <div class="field">
        <label>Address</label>
        <input formControlName="address" />
      </div>
    </div>
    <button class="btn btn-primary" type="submit" style="margin-top: 1rem">Save changes</button>
  </form>
</div>

<p class="page-sub"><a class="link" routerLink="/login">Logout (go to login)</a></p>
