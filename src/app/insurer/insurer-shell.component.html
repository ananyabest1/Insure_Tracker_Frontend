<div class="insurer-shell">
  <header class="bar">
    <a routerLink="/insurer/dashboard" class="app-brand">Insure<span>Tracker</span></a>
    <nav class="links">
      <a routerLink="/insurer/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
      <a routerLink="/insurer/claims" routerLinkActive="active">My Claims</a>
      <a routerLink="/insurer/pre-auth" routerLinkActive="active">Pre-Auth</a>
      <a routerLink="/insurer/health-score" routerLinkActive="active">Health Score</a>
      <a routerLink="/insurer/ratings" routerLinkActive="active">Ratings</a>
      <a routerLink="/insurer/profile" routerLinkActive="active">Profile</a>
    </nav>
    <div class="tools">
      <a routerLink="/insurer/notifications" class="app-icon-btn" aria-label="Notifications">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
      </a>
      <a routerLink="/insurer/profile" class="app-icon-btn" aria-label="Profile">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </a>
    </div>
  </header>

  <main class="main">
    <router-outlet />
  </main>
</div>
