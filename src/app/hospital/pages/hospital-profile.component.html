<h1 class="page-title">Hospital profile</h1>
<p class="page-sub">Update your hospital contact details (demo).</p>

<div class="card" style="padding: 1.25rem">
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="grid cols-2">
      <div class="field">
        <label>Hospital name</label>
        <input formControlName="name" />
      </div>
      <div class="field">
        <label>Hospital email</label>
        <input formControlName="email" />
      </div>
      <div class="field">
        <label>Phone</label>
        <input formControlName="phone" />
      </div>
      <div class="field">
        <label>Address</label>
        <input formControlName="address" />
      </div>
    </div>
    <button class="btn btn-primary" type="submit" style="margin-top: 1rem">Save changes</button>
  </form>
</div>

<p class="page-sub"><a class="link" routerLink="/login">Logout (demo)</a></p>
