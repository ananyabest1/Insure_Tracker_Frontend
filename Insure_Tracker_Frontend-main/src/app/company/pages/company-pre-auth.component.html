<h1 class="page-title">Pre-authorization requests</h1>
<p class="page-sub">Same workflow pattern as incoming claims (wireframe).</p>

<div class="tabs" style="margin-bottom: 0.75rem">
  <button type="button" class="tab" [class.active]="filter() === 'All'" (click)="setFilter('All')">All</button>
  <button type="button" class="tab" [class.active]="filter() === 'New'" (click)="setFilter('New')">New</button>
  <button type="button" class="tab" [class.active]="filter() === 'Under Review'" (click)="setFilter('Under Review')">In review</button>
  <button type="button" class="tab" [class.active]="filter() === 'Approved'" (click)="setFilter('Approved')">Approved</button>
  <button type="button" class="tab" [class.active]="filter() === 'Rejected'" (click)="setFilter('Rejected')">Rejected</button>
</div>

<div class="table-wrap">
  <table class="data">
    <thead>
      <tr>
        <th>Request ID</th>
        <th>Hospital</th>
        <th>Patient</th>
        <th>Requested on</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <ng-container *ngFor="let r of rows; trackBy: trackByIdentity">
        <tr>
          <td>
            <div><strong>{{ r.id }}</strong></div>
            <div class="muted">{{ r.date }}</div>
          </td>
          <td>{{ r.hospital }}</td>
          <td>{{ r.patient }}</td>
          <td>{{ r.on }}</td>
          <td><span class="badge info">{{ r.status }}</span></td>
          <td><a class="btn btn-secondary" routerLink="/company/pre-auth">View</a></td>
        </tr>
      </ng-container>
    </tbody>
  </table>
</div>
