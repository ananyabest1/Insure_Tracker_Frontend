<div class="navbar">
  <div class="logo">InsureTracker</div>

  <div class="nav-links">
    <a>Login</a>
    <a>Register</a>
    <a>Dashboard</a>
  </div>
</div>

<div class="login-page">

  <div class="login-card">

    <h1>InsureTracker</h1>

    <p class="subtitle">
      End-to-end medical claim management
    </p>

    <div class="role-tabs">

      <button class="active-tab">
        Insurer
      </button>

      <button>
        Insurance Co.
      </button>

      <button>
        Hospital
      </button>

    </div>

    <div class="form-group">
      <label>Email or Mobile Number</label>

      <input
        type="text"
        placeholder="Enter email or mobile"
      />
    </div>

    <div class="form-group">
      <label>Password</label>

      <input
        type="password"
        placeholder="Enter password"
      />
    </div>

    <button class="login-btn">
      Login
    </button>

    <button class="otp-btn">
      Login with OTP
    </button>

  </div>

</div>
