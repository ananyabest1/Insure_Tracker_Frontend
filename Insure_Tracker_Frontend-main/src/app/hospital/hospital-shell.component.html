<div class="hospital-shell">
  <header class="top">
    <a routerLink="/hospital/dashboard" class="brand">Insure<span>Tracker</span></a>
    <div class="tools">
      <a routerLink="/hospital/notifications" class="app-icon-btn" aria-label="Notifications">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
      </a>
      <a routerLink="/hospital/profile" class="app-icon-btn" aria-label="Profile">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" />
        </svg>
      </a>
    </div>
  </header>

  <nav class="subnav">
    <a routerLink="/hospital/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
    <a routerLink="/hospital/documents" routerLinkActive="active">Document upload</a>
    <a routerLink="/hospital/billing" routerLinkActive="active">Billing</a>
    <a routerLink="/hospital/pre-auth" routerLinkActive="active">Pre-auth</a>
    <a routerLink="/hospital/notifications" routerLinkActive="active">Notifications</a>
    <a routerLink="/hospital/profile" routerLinkActive="active">Profile</a>
  </nav>

  <main class="main">
    <router-outlet />
  </main>
</div>
